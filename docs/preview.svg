<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1200" height="760" fill="url(#bg)"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="1200" height="40" fill="#0b1220" opacity="0.85"/>
  <circle cx="24" cy="20" r="8" fill="url(#accent)"/>
  <text x="40" y="25" fill="#e2e8f0" font-size="15" font-weight="600">OmniOS AI</text>
  <text x="1060" y="25" fill="#94a3b8" font-size="13">Wi-Fi   △   100%   23:57</text>

  <!-- Left dock -->
  <rect x="16" y="60" width="96" height="684" rx="18" fill="#111a2e" opacity="0.9"/>
  <!-- App tiles -->
  <g font-size="22" font-weight="700" text-anchor="middle">
    <g transform="translate(32,84)">
      <rect width="64" height="64" rx="14" fill="#ef4444"/>
      <text x="32" y="41" fill="#fff">F</text>
      <rect x="40" y="40" width="22" height="16" rx="4" fill="#0ea5e9"/>
      <text x="51" y="52" fill="#fff" font-size="10">L</text>
      <text x="32" y="86" fill="#cbd5e1" font-size="11" font-weight="500">Firefox</text>
    </g>
    <g transform="translate(32,184)">
      <rect width="64" height="64" rx="14" fill="#1e40af"/>
      <text x="32" y="41" fill="#fff">Ps</text>
      <rect x="40" y="40" width="22" height="16" rx="4" fill="#22c55e"/>
      <text x="51" y="52" fill="#fff" font-size="10">W</text>
      <text x="32" y="86" fill="#cbd5e1" font-size="11" font-weight="500">Photoshop</text>
    </g>
    <g transform="translate(32,284)">
      <rect width="64" height="64" rx="14" fill="#db2777"/>
      <text x="32" y="41" fill="#fff">Ig</text>
      <rect x="40" y="40" width="22" height="16" rx="4" fill="#f59e0b"/>
      <text x="51" y="52" fill="#fff" font-size="10">A</text>
      <text x="32" y="86" fill="#cbd5e1" font-size="11" font-weight="500">Instagram</text>
    </g>
    <g transform="translate(32,384)">
      <rect width="64" height="64" rx="14" fill="#0891b2"/>
      <text x="32" y="41" fill="#fff" font-size="18">Fi</text>
      <text x="32" y="86" fill="#cbd5e1" font-size="11" font-weight="500">Files</text>
    </g>
    <g transform="translate(32,484)">
      <rect width="64" height="64" rx="14" fill="#475569"/>
      <text x="32" y="42" fill="#fff" font-size="26">⚙</text>
      <text x="32" y="86" fill="#cbd5e1" font-size="11" font-weight="500">Settings</text>
    </g>
  </g>

  <!-- Window 1 -->
  <g filter="url(#shadow)">
    <rect x="150" y="96" width="500" height="320" rx="12" fill="#0f172a"/>
    <rect x="150" y="96" width="500" height="34" rx="12" fill="#1e293b"/>
    <circle cx="172" cy="113" r="5" fill="#ef4444"/>
    <circle cx="190" cy="113" r="5" fill="#f59e0b"/>
    <circle cx="208" cy="113" r="5" fill="#22c55e"/>
    <text x="330" y="118" fill="#cbd5e1" font-size="12">Firefox — Linux (Flatpak)</text>
    <rect x="170" y="150" width="460" height="22" rx="6" fill="#1e293b"/>
    <rect x="170" y="186" width="300" height="14" rx="4" fill="#334155"/>
    <rect x="170" y="212" width="420" height="14" rx="4" fill="#27364b"/>
    <rect x="170" y="238" width="360" height="14" rx="4" fill="#27364b"/>
    <rect x="170" y="280" width="180" height="110" rx="8" fill="url(#accent)" opacity="0.25"/>
    <rect x="370" y="280" width="260" height="110" rx="8" fill="#1e293b"/>
  </g>

  <!-- Window 2 -->
  <g filter="url(#shadow)">
    <rect x="330" y="330" width="470" height="360" rx="12" fill="#0f172a"/>
    <rect x="330" y="330" width="470" height="34" rx="12" fill="#1e293b"/>
    <circle cx="352" cy="347" r="5" fill="#ef4444"/>
    <circle cx="370" cy="347" r="5" fill="#f59e0b"/>
    <circle cx="388" cy="347" r="5" fill="#22c55e"/>
    <text x="500" y="352" fill="#cbd5e1" font-size="12">Instagram — Android (Waydroid)</text>
    <rect x="360" y="390" width="410" height="170" rx="8" fill="#111a2e"/>
    <circle cx="420" cy="430" r="18" fill="#db2777"/>
    <rect x="450" y="418" width="160" height="12" rx="4" fill="#334155"/>
    <rect x="450" y="438" width="110" height="10" rx="4" fill="#27364b"/>
    <rect x="360" y="580" width="410" height="86" rx="8" fill="#1e293b"/>
  </g>

  <!-- AI Agent panel -->
  <g filter="url(#shadow)">
    <rect x="840" y="60" width="344" height="684" rx="16" fill="#0f172a"/>
    <rect x="840" y="60" width="344" height="54" rx="16" fill="#111a2e"/>
    <circle cx="872" cy="87" r="12" fill="url(#accent)"/>
    <text x="896" y="92" fill="#e2e8f0" font-size="15" font-weight="600">OmniOS Agent</text>

    <!-- user bubble -->
    <rect x="924" y="140" width="236" height="66" rx="12" fill="url(#accent)"/>
    <text x="944" y="168" fill="#fff" font-size="13">Open Firefox and set</text>
    <text x="944" y="188" fill="#fff" font-size="13">brightness to 40%</text>

    <!-- agent bubble -->
    <rect x="864" y="226" width="262" height="112" rx="12" fill="#1e293b"/>
    <text x="884" y="254" fill="#e2e8f0" font-size="13">Done.</text>
    <text x="884" y="278" fill="#86efac" font-size="12">✓ open_app(Firefox) → ok</text>
    <text x="884" y="300" fill="#86efac" font-size="12">✓ set_brightness(40) → ok</text>
    <text x="884" y="324" fill="#64748b" font-size="11">Permission level 2 · echo model</text>

    <!-- model switcher -->
    <rect x="864" y="360" width="296" height="40" rx="10" fill="#111a2e"/>
    <text x="884" y="385" fill="#94a3b8" font-size="12">Model: mistral-7b-instruct (llama.cpp)</text>

    <!-- input -->
    <rect x="864" y="686" width="296" height="40" rx="20" fill="#1e293b"/>
    <text x="884" y="711" fill="#64748b" font-size="13">Ask OmniOS to do something…</text>
  </g>

  <!-- footer badges -->
  <g font-size="12" fill="#cbd5e1">
    <rect x="150" y="712" width="96" height="26" rx="13" fill="#0ea5e9" opacity="0.25"/>
    <text x="166" y="729">Linux · Flatpak</text>
    <rect x="258" y="712" width="96" height="26" rx="13" fill="#6366f1" opacity="0.25"/>
    <text x="272" y="729">Wine / Proton</text>
    <rect x="366" y="712" width="96" height="26" rx="13" fill="#22c55e" opacity="0.25"/>
    <text x="382" y="729">Waydroid</text>
  </g>
</svg>
